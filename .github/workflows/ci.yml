name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: terminal-go/go.mod
          cache-dependency-path: |
            terminal-go/go.sum
            app/backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            terminal-web/package-lock.json
            app/web/package-lock.json
            e2e/package-lock.json

      - name: Install pinned renderer build tool
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1

      - name: Install real-shell matrix
        run: sudo apt-get update && sudo apt-get install -y zsh fish

      - name: Install terminal browser test runtime
        working-directory: terminal-web
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Checks
        env:
          FLOETERM_REQUIRE_REAL_SHELL_MATRIX: "1"
        run: make check
